name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: configure
        run: cmake --preset ci

      - name: build
        run: cmake --build --preset ci

      - name: test
        run: ctest --preset ci

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: clang-format check
        run: |
          # advisory only, doesnt block merges. just flags formatting drift in
          # our own code (build/ deps arent in the checkout so theyre skipped).
          shopt -s globstar nullglob
          files=(src/**/*.cpp include/**/*.hpp tests/**/*.cpp)
          if [ ${#files[@]} -eq 0 ]; then
            echo "nothing to lint yet"
            exit 0
          fi
          clang-format --dry-run --Werror --style=file "${files[@]}"
