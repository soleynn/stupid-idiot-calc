name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # the same ci preset (ninja + the warning set) built and tested on linux, macos
  # and windows. only linux fails the build on a warning (-Werror); macos and
  # windows still have uncleared apple-clang / msvc warnings, so they compile +
  # test without -Werror for now - flip a leg to ON once its warnings are gone.
  # the `build` job below folds these three legs into one check; thats the stable
  # name branch protection gates on, so the matrix can gain/drop an os freely.
  build-matrix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            werror: "ON"
          - os: macos-latest
            werror: "OFF"
          - os: windows-latest
            werror: "OFF"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: install ninja (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: install ninja (macos)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: set up msvc (windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: install ninja (windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: configure
        run: cmake --preset ci -DCALC_WARNINGS_AS_ERRORS=${{ matrix.werror }}

      - name: build
        run: cmake --build --preset ci

      - name: test
        run: ctest --preset ci

  # the required check. green only when every leg of build-matrix is. branch
  # protection requires `build`, so keeping that name on this aggregate job means
  # the matrix can add or drop an os without ever touching the protection rule.
  build:
    if: always()
    needs: [build-matrix]
    runs-on: ubuntu-latest
    steps:
      - name: every build leg passed
        run: |
          result='${{ needs.build-matrix.result }}'
          echo "build matrix result: $result"
          test "$result" = success

  # advisory asan/ubsan run; not a required check, so a red x here doesnt block.
  sanitize:
    runs-on: ubuntu-latest
    env:
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
    steps:
      - uses: actions/checkout@v4

      - name: install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: configure
        run: cmake --preset sanitize

      - name: build
        run: cmake --build --preset sanitize

      - name: test
        run: ctest --preset sanitize

  # advisory: build + test under clang with libc++. the float overload of
  # std::from_chars only reached libc++ in llvm 20, so the lexer leans on
  # fast_float to parse numbers here instead; this leg is the guard that the
  # engine still compiles and the goldens still pass on that stdlib.
  libcxx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install ninja + clang + libc++
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang libc++-dev libc++abi-dev

      - name: configure (clang, libc++)
        run: |
          cmake -S . -B build/libcxx -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_FLAGS=-stdlib=libc++ \
            -DCMAKE_EXE_LINKER_FLAGS=-stdlib=libc++

      - name: build
        run: cmake --build build/libcxx

      - name: test
        run: ctest --test-dir build/libcxx --output-on-failure --no-tests=error

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: clang-format check
        run: |
          # advisory only, doesnt block merges. just flags formatting drift in
          # our own code (build/ deps arent in the checkout so theyre skipped).
          shopt -s globstar nullglob
          files=(src/**/*.cpp include/**/*.hpp tests/**/*.cpp)
          if [ ${#files[@]} -eq 0 ]; then
            echo "nothing to lint yet"
            exit 0
          fi
          clang-format --dry-run --Werror --style=file "${files[@]}"

  # advisory: runs clang-tidy over our own code (.clang-tidy config). findings
  # are printed but dont fail the job (WarningsAsErrors is empty); a real clang
  # parse error still goes red. deps + the test TUs are skipped.
  clang-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install ninja + clang-tidy
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang-tidy

      - name: configure
        run: cmake --preset debug

      - name: clang-tidy
        run: clang-tidy -p build/debug src/engine/*.cpp src/cli/*.cpp

  # advisory: a gcov line/branch coverage report over the engine + cli, driven by
  # the test suite. printed to the log and the run summary; never blocks.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install ninja + gcovr
        run: sudo apt-get update && sudo apt-get install -y ninja-build gcovr

      - name: configure
        run: cmake --preset coverage

      - name: build
        run: cmake --build --preset coverage

      - name: test
        run: ctest --preset coverage

      - name: coverage report
        run: |
          gcovr --root . --filter 'include/calc/' --filter 'src/' \
            --exclude-unreachable-branches --print-summary build/coverage \
            | tee -a "$GITHUB_STEP_SUMMARY"

  # advisory: build the clang libFuzzer harness and run a short campaign over the
  # parse pipeline. separate from the gcc `build` gate; a found crash goes red.
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install ninja + clang
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang

      - name: configure (clang, fuzzers + sanitizers, no test deps)
        run: |
          cmake -S . -B build/fuzz -G Ninja \
            -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ \
            -DCALC_BUILD_TESTS=OFF -DCALC_ENABLE_FUZZERS=ON \
            -DCALC_ENABLE_SANITIZERS=ON

      - name: build fuzzer
        run: cmake --build build/fuzz --target fuzz_parse

      - name: fuzz for 30s
        run: ./build/fuzz/fuzz_parse -max_total_time=30 -timeout=10 -rss_limit_mb=2048

  # advisory: build the Qt Quick gui against the unchanged engine and run its
  # headless --selftest. Qt comes prebuilt via aqtinstall (dynamic, LGPLv3), not
  # vcpkg - vcpkg builds Qt from source and would cost hours a leg. separate from
  # the required `build` gate; a break here doesnt block a merge.
  gui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: install qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: 6.8.1
          cache: true

      - name: configure
        run: cmake --preset gui

      - name: build
        run: cmake --build --preset gui

      # construct the bridge + evaluate "1 + 2 * 3", no window. offscreen so it
      # needs no display. proves the gui computes without anyone clicking.
      - name: headless self-test
        run: QT_QPA_PLATFORM=offscreen ./build/gui/calc-gui --selftest

  # advisory: package calc-gui into a self-contained mac .dmg / windows .zip with
  # Qt bundled (dynamic, LGPLv3), then prove the archive runs with Qt scrubbed
  # from the loader path - the real check that Qt is bundled, not just present on
  # the runner. linux ships via flatpak so it's not in this matrix. separate from
  # the required `build` gate; a red x here never blocks a merge.
  desktop-archives:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: install ninja (macos)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: set up msvc (windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: install ninja (windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: install qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: 6.8.1
          cache: true

      - name: configure
        run: cmake --preset gui-release

      - name: build
        run: cmake --build --preset gui-release

      - name: package
        run: cpack --config build/gui-release/CPackConfig.cmake -B build/gui-release

      # mac: mount the dmg, copy the .app off the read-only image, detach, then run
      # the bundled binary with the env stripped (env -i drops DYLD_* + the aqt
      # exports; PATH=/usr/bin:/bin drops the aqt Qt bin). a correctly deployed
      # bundle resolves Qt via @executable_path/../Frameworks and prints the
      # version; an under-deployed one fails dyld resolution and exits nonzero. the
      # qml modules arent exercised by --version (it returns before the qml load),
      # so assert their dirs are bundled too.
      - name: smoke test (macos)
        if: runner.os == 'macOS'
        run: |
          set -euxo pipefail
          DMG=$(ls build/gui-release/*.dmg)
          MP=$(hdiutil attach "$DMG" -nobrowse -readonly | grep -o '/Volumes/[^[:space:]].*' | tail -1)
          echo "=== dmg root ==="; ls -la "$MP"
          APP=$(ls -d "$MP"/*.app)
          cp -R "$APP" "$RUNNER_TEMP/calc-gui.app"
          hdiutil detach "$MP"
          APP="$RUNNER_TEMP/calc-gui.app"
          echo "=== bundle dirs ==="; find "$APP/Contents" -maxdepth 4 -type d
          env -i HOME="$HOME" PATH=/usr/bin:/bin "$APP/Contents/MacOS/calc-gui" --version
          find "$APP" -type d -path '*qml/QtQuick/Controls*' | grep -q . || { echo "QtQuick.Controls qml not bundled"; exit 1; }
          find "$APP" -type d -path '*qml/QtQuick/Layouts*'  | grep -q . || { echo "QtQuick.Layouts qml not bundled"; exit 1; }

      # windows: unzip to a temp tree (NOT the build dir), drop everything but the
      # system dirs from PATH so the only Qt6*.dll the loader can find is the one
      # beside the exe, then run --version. no WIN32_EXECUTABLE, so stdout is
      # delivered and we assert on the exit code. qwindows.dll + the qml modules
      # must be bundled too.
      - name: smoke test (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zip = Get-ChildItem build/gui-release/*.zip | Select-Object -First 1
          if (-not $zip) { throw "no .zip produced by cpack" }
          $out = Join-Path $env:RUNNER_TEMP "unpacked"
          Expand-Archive -Path $zip.FullName -DestinationPath $out -Force
          Write-Host "=== archive tree ==="; Get-ChildItem -Path $out -Recurse -Name
          $exe = Get-ChildItem -Path $out -Recurse -Filter calc-gui.exe | Select-Object -First 1
          if (-not $exe) { throw "calc-gui.exe not found in archive" }
          # windeployqt lands plugins under plugins/ and qml under qml/, not next to
          # the exe - so search the whole tree rather than assume a flat layout.
          if (-not (Get-ChildItem -Path $out -Recurse -Filter qwindows.dll -ErrorAction SilentlyContinue)) { throw "qwindows.dll not bundled" }
          if (-not (Get-ChildItem -Path $out -Recurse -Directory -Filter Controls -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match 'QtQuick' })) { throw "QtQuick.Controls qml not bundled" }
          # scrub Qt from PATH - the exe sits with its dlls in bin/, so a clean run
          # proves the archive is self-contained, not borrowing the runner's qt.
          $env:PATH = "$env:SystemRoot\System32;$env:SystemRoot"
          & $exe.FullName --version
          if ($LASTEXITCODE -ne 0) { throw "calc-gui --version exit $LASTEXITCODE (missing bundled dll?)" }

      - name: upload archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: calc-gui-${{ matrix.os }}
          path: |
            build/gui-release/*.dmg
            build/gui-release/*.zip
          if-no-files-found: error
